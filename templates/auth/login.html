<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — UAI Convalidaciones</title>
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#0f172a 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
    .login-wrap{width:100%;max-width:420px;animation:fadeUp .4s ease;}
    .login-logo{text-align:center;margin-bottom:2rem;}
    .login-logo-icon{width:64px;height:64px;background:rgba(255,255,255,.1);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto .75rem;border:1px solid rgba(255,255,255,.12);}
    .login-logo-title{color:#fff;font-size:1.35rem;font-weight:700;letter-spacing:-.02em;}
    .login-logo-sub{color:rgba(255,255,255,.5);font-size:.82rem;margin-top:.2rem;}
    .login-card{background:#fff;border-radius:18px;padding:2rem;box-shadow:0 24px 48px rgba(0,0,0,.35);}
    .login-card h2{font-size:1rem;font-weight:600;color:#111827;margin-bottom:.25rem;}
    .login-card p{font-size:.8rem;color:#6b7280;margin-bottom:1.5rem;}
    .form-group{margin-bottom:1.1rem;}
    .form-label{display:block;font-size:.75rem;font-weight:600;color:#374151;margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.05em;}
    .form-input{width:100%;padding:.65rem .85rem;border:1.5px solid #e5e7eb;border-radius:10px;font-size:.88rem;font-family:'Inter',sans-serif;transition:border-color .18s,box-shadow .18s;outline:none;color:#111827;}
    .form-input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.12);}
    .btn-login{width:100%;padding:.75rem;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;border:none;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .18s;margin-top:.5rem;font-family:'Inter',sans-serif;}
    .btn-login:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(37,99,235,.4);}
    .btn-login:active{transform:translateY(0);}
    .alert{padding:.65rem .85rem;border-radius:8px;font-size:.79rem;margin-bottom:1rem;}
    .alert-danger{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;}
    .alert-warning{background:#fffbeb;color:#d97706;border:1px solid #fde68a;}
    .alert-success{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;}
    .input-wrap{position:relative;}
    .input-icon{position:absolute;left:.82rem;top:50%;transform:translateY(-50%);color:#9ca3af;font-size:.9rem;pointer-events:none;}
    .form-input.with-icon{padding-left:2.4rem;}
    .toggle-pwd{position:absolute;right:.82rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9ca3af;font-size:.88rem;padding:.15rem;}
    .toggle-pwd:hover{color:#6b7280;}
    .login-footer{text-align:center;margin-top:1.25rem;font-size:.75rem;color:rgba(255,255,255,.4);}
    @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">
    <div class="login-logo-icon">🎓</div>
    <div class="login-logo-title">UAI Convalidaciones</div>
    <div class="login-logo-sub">Sistema Académico · 2026</div>
  </div>

  <div class="login-card">
    <h2>Bienvenido de vuelta</h2>
    <p>Ingresa tus credenciales para continuar</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label class="form-label">Usuario (DNI)</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input class="form-input with-icon" type="text" name="dni"
                 placeholder="Ingresa tu DNI" autofocus autocomplete="username">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input class="form-input with-icon" type="password" id="pwd_input"
                 name="contrasena" placeholder="Contraseña" autocomplete="current-password">
          <button type="button" class="toggle-pwd" onclick="togglePwd()">👁</button>
        </div>
      </div>
      <button type="submit" class="btn-login">Iniciar sesión</button>
    </form>
  </div>
  <div class="login-footer">UAI © 2026 — Sistema de Gestión Académica</div>
</div>
<script>
function togglePwd(){
  const i=document.getElementById('pwd_input');
  i.type=i.type==='password'?'text':'password';
}
</script>
</body>
</html>
